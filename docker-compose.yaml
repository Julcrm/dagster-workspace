version: "3.8"

# =============================================================================
# Dagster Workspace — Docker Compose
# Services:
#   - dagster-webserver: Dagster UI + GraphQL API (port 3000, public)
#   - dagster-daemon: scheduler, sensor runner, run launcher (no exposed port)
# Storage: PostgreSQL (external, injected via env vars)
# Network: coolify (external — shared with all project code servers)
# =============================================================================

services:
  # Serves the Dagster UI and handles API requests from the browser
  dagster-webserver:
    build: .
    container_name: dagster-webserver
    ports:
      - "3000:3000"
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_HOST=${DAGSTER_POSTGRES_HOST}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
    networks:
      - coolify
    restart: always

  # Runs schedules, sensors and launches pipeline runs in the background
  dagster-daemon:
    build: .
    container_name: dagster-daemon
    command: dagster-daemon run -w workspace.yaml
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_HOST=${DAGSTER_POSTGRES_HOST}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
    networks:
      - coolify
    restart: always
    depends_on:
      - dagster-webserver

networks:
  # Shared Coolify network — allows this service to reach project gRPC servers by container name
  coolify:
    external: true
    name: coolify
